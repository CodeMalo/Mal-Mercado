<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mal Mercado — Disclaimer 03 · Corporativo</title>
<!--
  DISCLAIMER ANIMADO 03 · INSTITUCIONAL / CORPORATIVO PREMIUM
  Formato vertical 9:16 para redes. Grabar con Win+Alt+R u OBS a 1080x1920.
  Ciclo ~20s en loop.
  Personalización: edita el arreglo CLAUSULAS al final.
  Dirección de arte: un "documento" corporativo vivo — cláusulas numeradas que
  se asientan una a una sobre grafito profundo, líneas finas que se trazan como
  reglas tipográficas, mayúsculas espaciadas. La sobriedad ES el mensaje; el
  verde aparece solo al final, como sello.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{ --grafito:#131619; --panel:#181c20; --texto:#eceff1; --gris:#7c868d; --linea:#2a3036; --verde:#3ef08c; }
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:grid;place-items:center;min-height:100vh;font-family:"Space Grotesk",sans-serif}
.stage{width:min(56.25vh,100vw);aspect-ratio:9/16;background:var(--grafito);position:relative;overflow:hidden;
  padding:10% 9%;display:flex;flex-direction:column}

/* membrete */
.membrete{display:flex;justify-content:space-between;align-items:baseline;
  font-family:"JetBrains Mono",monospace;font-size:clamp(9px,1.2vh,12px);letter-spacing:.24em;color:var(--gris)}
.membrete b{color:var(--texto);font-weight:500}
.membrete + .raya{margin-top:2.2vh}
.raya{height:1px;background:var(--linea);transform:scaleX(0);transform-origin:left;animation:trazar 1.1s cubic-bezier(.22,.8,.3,1) forwards}
@keyframes trazar{to{transform:scaleX(1)}}

.titulo{margin-top:4.5vh;font-weight:700;font-size:clamp(22px,3.6vh,38px);letter-spacing:.02em;color:var(--texto);
  opacity:0;animation:asentar .9s ease .5s forwards}
.titulo small{display:block;font-family:"JetBrains Mono",monospace;font-weight:400;font-size:clamp(9px,1.2vh,12px);
  letter-spacing:.3em;color:var(--gris);margin-bottom:1.2vh}
@keyframes asentar{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* cláusulas */
.clausulas{margin-top:4vh;flex:1}
.clausula{display:grid;grid-template-columns:auto 1fr;gap:2.4vh;padding:2.35vh 0;border-bottom:1px solid var(--linea);
  opacity:0;transform:translateY(12px)}
.clausula.on{animation:asentar .8s cubic-bezier(.22,.8,.3,1) forwards}
.clausula .n{font-family:"JetBrains Mono",monospace;font-size:clamp(10px,1.4vh,14px);color:var(--gris);padding-top:.35vh}
.clausula .c b{display:block;font-size:clamp(14px,2.2vh,22px);font-weight:500;letter-spacing:.14em;color:var(--texto)}
.clausula .c span{display:block;font-size:clamp(10px,1.5vh,14px);color:var(--gris);margin-top:.6vh;line-height:1.55}

/* sello final */
.sello{display:flex;justify-content:space-between;align-items:center;padding-top:2.6vh;opacity:0}
.sello.on{animation:asentar .9s ease forwards}
.sello .firma{font-weight:700;font-size:clamp(15px,2.4vh,24px);letter-spacing:.06em;color:var(--texto)}
.sello .firma b{color:var(--verde)}
.sello .anillo{width:6.2vh;height:6.2vh;border:1px solid var(--verde);border-radius:50%;position:relative;
  display:grid;place-items:center}
.sello .anillo::before{content:"";position:absolute;inset:-7px;border:1px solid rgba(62,240,140,.25);border-radius:50%;
  animation:expandir 2.2s ease-out infinite}
.sello .anillo i{width:1.4vh;height:1.4vh;border-radius:50%;background:var(--verde);box-shadow:0 0 12px var(--verde)}
@keyframes expandir{0%{transform:scale(.8);opacity:1}100%{transform:scale(1.35);opacity:0}}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="membrete"><span><b>MAL MERCADO</b></span><span>DOC · DISCLAIMER</span></div>
  <div class="raya"></div>
  <h1 class="titulo"><small>TÉRMINOS DE LECTURA</small>Lo que somos.<br>Y lo que no.</h1>
  <div class="clausulas" id="clausulas"></div>
  <div class="sello" id="sello">
    <span class="firma">MAL <b>MERCADO</b></span>
    <span class="anillo"><i></i></span>
  </div>
</div>

<script>
const CLAUSULAS = [
  { t: "CONTENIDO EDUCATIVO",       d: "Análisis general de mercados. La misma información para todos los lectores." },
  { t: "SIN ASESORÍA PERSONALIZADA", d: "No somos asesores registrados. Ninguna pieza constituye una recomendación individual." },
  { t: "SIN RENDIMIENTOS GARANTIZADOS", d: "El rendimiento pasado no asegura el futuro. Quien lo garantice, miente." },
  { t: "TU DINERO, TU CONTROL",     d: "Nunca tocamos tu capital. Todo ocurre en tu broker, bajo tus decisiones." },
];
const ENTRADA = 1500;    // ms entre cláusulas
const PAUSA_FINAL = 5200;

const cont = document.getElementById("clausulas");
const sello = document.getElementById("sello");
function render() {
  cont.innerHTML = "";
  sello.classList.remove("on");
  return CLAUSULAS.map((c, i) => {
    const div = document.createElement("div");
    div.className = "clausula";
    div.innerHTML = `<span class="n">0${i + 1}</span><div class="c"><b>${c.t}</b><span>${c.d}</span></div>`;
    cont.appendChild(div);
    return div;
  });
}
function ciclo() {
  const nodos = render();
  nodos.forEach((n, i) => setTimeout(() => n.classList.add("on"), 1600 + i * ENTRADA));
  setTimeout(() => sello.classList.add("on"), 1600 + CLAUSULAS.length * ENTRADA);
  setTimeout(ciclo, 1600 + CLAUSULAS.length * ENTRADA + PAUSA_FINAL);
}
ciclo();
</script>
</body>
</html>
