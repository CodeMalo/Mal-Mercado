<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mal Mercado — Disclaimer 02 · Futurista IA</title>
<!--
  DISCLAIMER ANIMADO 02 · FUTURISTA / ESTÉTICA IA
  Formato vertical 9:16 para redes. Grabar con Win+Alt+R u OBS a 1080x1920.
  Ciclo ~21s en loop.
  Personalización: edita el arreglo LINEAS al final.
  Dirección de arte: el radar del logo Mal Mercado como protagonista (anillos +
  barrido + punto señal), texto tecleado tipo consola, retícula de fondo y un
  pulso glitch en la frase clave. Sensación: sala de máquinas de una IA financiera.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{ --negro:#060807; --verde:#3ef08c; --verde-dim:rgba(62,240,140,.35); --gris:#5f6a64; --texto:#e8efeb; }
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:grid;place-items:center;min-height:100vh}
.stage{width:min(56.25vh,100vw);aspect-ratio:9/16;background:var(--negro);position:relative;overflow:hidden;
  font-family:"JetBrains Mono",monospace}

/* retícula + scanline */
.stage::before{content:"";position:absolute;inset:0;
  background:linear-gradient(rgba(62,240,140,.05) 1px,transparent 1px),
             linear-gradient(90deg,rgba(62,240,140,.05) 1px,transparent 1px);
  background-size:11% 6.1875%}
.scan{position:absolute;left:0;right:0;height:18%;pointer-events:none;
  background:linear-gradient(180deg,transparent,rgba(62,240,140,.06),transparent);
  animation:barrerV 5s linear infinite}
@keyframes barrerV{from{top:-20%}to{top:110%}}

/* radar (motivo del logo) */
.radar{position:absolute;top:9%;left:50%;transform:translateX(-50%);width:38%;aspect-ratio:1}
.radar i{position:absolute;inset:0;border:1px solid var(--verde-dim);border-radius:50%;animation:onda 3.2s ease-out infinite}
.radar i:nth-child(2){animation-delay:1.05s}
.radar i:nth-child(3){animation-delay:2.1s}
@keyframes onda{0%{transform:scale(.35);opacity:1}100%{transform:scale(1.25);opacity:0}}
.radar .disco{position:absolute;inset:18%;border:1px solid var(--verde-dim);border-radius:50%;overflow:hidden}
.radar .disco::before{content:"";position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg,var(--verde-dim),transparent 75deg);animation:girar 3s linear infinite}
@keyframes girar{to{transform:rotate(360deg)}}
.radar .punto{position:absolute;top:26%;right:14%;width:9%;aspect-ratio:1;border-radius:50%;background:var(--verde);
  box-shadow:0 0 18px var(--verde);animation:latir 1.5s ease-in-out infinite}
@keyframes latir{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}

/* cabecera de sistema */
.cabecera{position:absolute;top:4%;left:7%;right:7%;display:flex;justify-content:space-between;
  font-size:clamp(8px,1.1vh,11px);letter-spacing:.18em;color:var(--gris)}
.cabecera b{color:var(--verde);font-weight:500}

/* consola */
.consola{position:absolute;top:44%;left:9%;right:9%;font-size:clamp(13px,2vh,20px);line-height:2.15;color:var(--texto)}
.consola .fila{min-height:2.15em;display:flex;align-items:baseline;gap:.6em;opacity:0}
.consola .fila.on{opacity:1}
.consola .pref{color:var(--verde);flex-shrink:0}
.consola .txt{white-space:pre-wrap}
.consola .glitch{color:var(--verde);font-weight:700;position:relative;animation:tiembla .09s steps(2) 6 3.4s}
@keyframes tiembla{0%{transform:translate(0)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-1px,-1px)}100%{transform:translate(0)}}
.cursor{display:inline-block;width:.55em;height:1.05em;background:var(--verde);vertical-align:text-bottom;
  animation:parpadeo .9s steps(1) infinite;margin-left:2px}
@keyframes parpadeo{50%{opacity:0}}

/* pie de marca */
.pie{position:absolute;bottom:6%;left:9%;right:9%;display:flex;justify-content:space-between;align-items:center;
  border-top:1px solid rgba(62,240,140,.2);padding-top:2vh}
.pie .marca{font-family:"Space Grotesk",sans-serif;font-weight:700;letter-spacing:.06em;color:#fff;font-size:clamp(13px,2vh,20px)}
.pie .marca b{color:var(--verde)}
.pie .estado{font-size:clamp(8px,1.1vh,11px);letter-spacing:.2em;color:var(--gris)}
.pie .estado i{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--verde);
  margin-right:6px;box-shadow:0 0 8px var(--verde);animation:latir 1.5s ease-in-out infinite;font-style:normal}
</style>
</head>
<body>
<div class="stage">
  <div class="scan"></div>
  <div class="cabecera"><span>SYS <b>MAL_MERCADO</b></span><span id="reloj">--:--:--</span></div>
  <div class="radar"><i></i><i></i><i></i><div class="disco"></div><div class="punto"></div></div>
  <div class="consola" id="consola"></div>
  <div class="pie">
    <span class="marca">MAL <b>MERCADO</b></span>
    <span class="estado"><i></i>SEÑAL ACTIVA</span>
  </div>
</div>

<script>
const LINEAS = [
  { pref: "$",  txt: "iniciar disclaimer.exe" },
  { pref: ">",  txt: "contenido: educativo e informativo" },
  { pref: ">",  txt: "asesores financieros: NO registrados" },
  { pref: ">",  txt: "rendimientos garantizados: NO existen", glitch: "NO existen" },
  { pref: ">",  txt: "tu dinero permanece en TU broker" },
  { pref: ">",  txt: "decisiones: 100% tuyas" },
  { pref: "$",  txt: "el mercado es ruido. recibe la señal." },
];
const VEL = 34;          // ms por carácter
const PAUSA_FINAL = 3600; // ms al terminar antes de reiniciar

const consola = document.getElementById("consola");
function crearFilas() {
  consola.innerHTML = "";
  return LINEAS.map(l => {
    const fila = document.createElement("div");
    fila.className = "fila";
    fila.innerHTML = `<span class="pref">${l.pref}</span><span class="txt"></span>`;
    consola.appendChild(fila);
    return fila;
  });
}
function teclear(fila, linea) {
  return new Promise(res => {
    fila.classList.add("on");
    const txt = fila.querySelector(".txt");
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    fila.appendChild(cursor);
    let i = 0;
    const t = setInterval(() => {
      txt.textContent = linea.txt.slice(0, ++i);
      if (i >= linea.txt.length) {
        clearInterval(t);
        cursor.remove();
        if (linea.glitch) txt.innerHTML = linea.txt.replace(linea.glitch, `<span class="glitch">${linea.glitch}</span>`);
        res();
      }
    }, VEL);
  });
}
async function ciclo() {
  const filas = crearFilas();
  for (let i = 0; i < LINEAS.length; i++) {
    await teclear(filas[i], LINEAS[i]);
    await new Promise(r => setTimeout(r, 420));
  }
  setTimeout(ciclo, PAUSA_FINAL);
}
ciclo();
setInterval(() => {
  document.getElementById("reloj").textContent = new Date().toLocaleTimeString("es-MX", { hour12: false });
}, 1000);
</script>
</body>
</html>
